name: Codex self-improvement plugin

on:
  pull_request:
    paths:
      - "plugins/chatgpt-codex-self-improving-skills/**"
      - ".agents/plugins/marketplace.json"
      - ".github/workflows/codex-self-improvement.yml"
  push:
    branches: [main]
    paths:
      - "plugins/chatgpt-codex-self-improving-skills/**"
      - ".agents/plugins/marketplace.json"
      - ".github/workflows/codex-self-improvement.yml"

jobs:
  test:
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install pytest pytest-timeout
      - run: python -m pytest -vv --timeout=60 plugins/chatgpt-codex-self-improving-skills/tests
      - run: python -m compileall -q plugins/chatgpt-codex-self-improving-skills/scripts
      - name: Execute Windows hook wrapper
        if: runner.os == 'Windows'
        shell: cmd
        run: call plugins\chatgpt-codex-self-improving-skills\scripts\run_python.cmd --version
      - name: Validate JSON manifests
        shell: python
        run: |
          import json
          from pathlib import Path

          for path in (
              Path(".agents/plugins/marketplace.json"),
              Path("plugins/chatgpt-codex-self-improving-skills/.codex-plugin/plugin.json"),
              Path("plugins/chatgpt-codex-self-improving-skills/.mcp.json"),
              Path("plugins/chatgpt-codex-self-improving-skills/hooks/hooks.json"),
          ):
              json.loads(path.read_text(encoding="utf-8"))
