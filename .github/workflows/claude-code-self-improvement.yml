name: Claude Code self-improvement plugin

# The background distillation worker spawns detached processes, holds SQLite
# leases, and pipes a prompt over stdin — the exact area where the sibling
# Codex plugin needed three follow-up commits to get Windows right. Run the
# suite on all three OSes so those bugs surface here rather than on a user's
# machine.

on:
  pull_request:
    paths:
      - "plugins/claude-code-self-improving-skills/**"
      - ".claude-plugin/marketplace.json"
      - ".github/workflows/claude-code-self-improvement.yml"
  push:
    branches: [main]
    paths:
      - "plugins/claude-code-self-improving-skills/**"
      - ".claude-plugin/marketplace.json"
      - ".github/workflows/claude-code-self-improvement.yml"

jobs:
  test:
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - run: python -m pip install pytest pytest-timeout
      - name: Test plugin
        run: python -m pytest -vv --timeout=60 plugins/claude-code-self-improving-skills/tests
      - run: python -m compileall -q plugins/claude-code-self-improving-skills/scripts

      # The tests invoke the Python scripts directly, which would pass even if
      # the shell hooks Claude Code actually runs were broken. Windows is where
      # that gap bites: there is no `python3` on a standard install, so a hook
      # that hardcodes it becomes a silent no-op nobody notices.
      - name: Run the real hook commands
        shell: bash
        env:
          CLAUDE_PLUGIN_ROOT: ${{ github.workspace }}/plugins/claude-code-self-improving-skills
        run: |
          set -euo pipefail
          out=$(echo '{}' | bash "$CLAUDE_PLUGIN_ROOT/hooks/distill-nudge.sh")
          echo "Stop hook -> $out"
          echo "$out" | python -c 'import json,sys; assert json.load(sys.stdin)["decision"] in ("approve","block")'

          payload='{"tool_input":{"file_path":"/nonexistent/.claude/skills/x/SKILL.md"}}'
          echo "$payload" | bash "$CLAUDE_PLUGIN_ROOT/hooks/backup-skill.sh"
          echo "$payload" | bash "$CLAUDE_PLUGIN_ROOT/hooks/validate-skill.sh"
          echo '{"source":"startup"}' | bash "$CLAUDE_PLUGIN_ROOT/hooks/session-init.sh" >/dev/null

          # An interpreter must actually have been found; an empty SIS_PYTHON
          # means every hook above exited early and proved nothing.
          . "$CLAUDE_PLUGIN_ROOT/hooks/python3.sh"
          test -n "$SIS_PYTHON"
          echo "interpreter: $SIS_PYTHON"
      - name: Validate JSON manifests and plugin version parity
        shell: python
        run: |
          import json
          from pathlib import Path

          plugin_dir = Path("plugins/claude-code-self-improving-skills")
          manifest = json.loads(
              (plugin_dir / ".claude-plugin/plugin.json").read_text(encoding="utf-8"))
          json.loads((plugin_dir / "hooks/hooks.json").read_text(encoding="utf-8"))

          market = json.loads(
              Path(".claude-plugin/marketplace.json").read_text(encoding="utf-8"))
          entries = [p for p in market["plugins"] if p["name"] == manifest["name"]]
          if len(entries) != 1:
              raise SystemExit(
                  f"expected exactly one marketplace entry for {manifest['name']},"
                  f" found {len(entries)}")
          # Bumping only one of the two files is a mistake this repo has made
          # before; the mismatch is invisible until someone installs the plugin.
          if entries[0]["version"] != manifest["version"]:
              raise SystemExit(
                  "version mismatch: marketplace.json says"
                  f" {entries[0]['version']}, plugin.json says {manifest['version']}")
